<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOL 1000 - Exam Review Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .flip-card { perspective: 1000px; height: 220px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .flip-card-front { background-color: #ffffff; color: #1e293b; border: 2px solid #e2e8f0; }
        .flip-card-back { background-color: #1e40af; color: white; transform: rotateY(180deg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Qualitative Feedback Colors */
        .ans-correct { background-color: #ecfdf5 !important; border-color: #10b981 !important; color: #065f46 !important; font-weight: 600; }
        .ans-wrong { background-color: #fef2f2 !important; border-color: #ef4444 !important; color: #991b1b !important; font-weight: 600; }
        .ans-neutral { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans min-h-screen pb-20 md:pb-0 md:pt-16">

    <!-- Navbar -->
    <nav class="fixed bottom-0 w-full bg-white shadow-md border-t md:top-0 md:bottom-auto md:border-b z-50">
        <div class="max-w-5xl mx-auto flex justify-around md:justify-center md:space-x-12 p-3">
            <button onclick="nav('dashboard')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="dashboard"><i class="fas fa-th-large text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Dashboard</span></button>
            <button onclick="nav('quiz')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="quiz"><i class="fas fa-edit text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Quiz</span></button>
            <button onclick="nav('flashcards')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="flashcards"><i class="fas fa-clone text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Cards</span></button>
            <button onclick="nav('review')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="review"><i class="fas fa-history text-xl mb-1"></i><span class="text-[10px] font-bold uppercase">Review</span></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pt-6 md:pt-10">
        
        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content active">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-1">ECOL 1000</h1>
            <p class="text-blue-600 font-bold mb-8 italic">Ecological Basis of Environmental Issues</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Answered</p>
                    <p class="text-3xl font-black text-slate-800" id="dash-prog">0/100</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Success</p>
                    <p class="text-3xl font-black text-emerald-600" id="dash-success">0%</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Mistakes</p>
                    <p class="text-3xl font-black text-rose-500" id="dash-errors">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-[10px] uppercase text-slate-400 font-bold mb-1">Bookmarks</p>
                    <p class="text-3xl font-black text-amber-500" id="dash-bookmarks">0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
                <h2 class="text-lg font-bold mb-4">Mastery by Lecture</h2>
                <div id="chapter-stats" class="space-y-4"></div>
            </div>
            
            <button onclick="resetData()" class="text-xs text-slate-400 hover:text-red-500 transition underline">Reset all progress data</button>
        </section>

        <!-- QUIZ -->
        <section id="quiz" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold text-slate-900">Quiz Mode</h2>
                <div class="flex gap-2">
                    <button id="btn-shuffle" onclick="toggleShuffle()" class="px-3 py-2 bg-white border rounded-lg text-xs font-bold transition hover:bg-slate-50"><i class="fas fa-random mr-1"></i> Shuffle: <span id="shuffle-status">OFF</span></button>
                    <select id="quiz-filter" class="p-2 border rounded-lg text-xs font-bold bg-white" onchange="startQuiz()">
                        <option value="all">All Lectures (100 Qs)</option>
                        <option value="L11">L11 - Biodiversity</option>
                        <option value="L12">L12 - Extinctions</option>
                        <option value="L13">L13 - Invasives</option>
                        <option value="L14">L14 - Conservation</option>
                    </select>
                </div>
            </div>
            
            <div id="quiz-container" class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200"></div>
            
            <div class="flex justify-between items-center mt-6">
                <button onclick="prevQuestion()" class="p-3 w-12 h-12 flex items-center justify-center bg-white border rounded-full hover:bg-slate-50 transition"><i class="fas fa-arrow-left"></i></button>
                <span id="quiz-counter" class="text-xs font-black text-slate-300 uppercase tracking-widest">1 / 100</span>
                <button onclick="nextQuestion()" class="p-3 w-12 h-12 flex items-center justify-center bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md transition"><i class="fas fa-arrow-right"></i></button>
            </div>
        </section>

        <!-- FLASHCARDS -->
        <section id="flashcards" class="tab-content">
            <h2 class="text-2xl font-bold text-slate-900 mb-6">Terms & Definitions (32)</h2>
            <div id="flashcards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- REVIEW -->
        <section id="review" class="tab-content">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Review Center</h2>
            <p class="text-slate-500 text-sm mb-6">Focus on your weak points and saved questions.</p>
            
            <div class="flex space-x-4 mb-6 border-b pb-2">
                <button onclick="setReviewMode('errors')" id="btn-rev-errors" class="font-bold text-rose-600 border-b-2 border-rose-600 pb-1">Mistakes</button>
                <button onclick="setReviewMode('bookmarks')" id="btn-rev-bookmarks" class="font-bold text-slate-400 pb-1">Favorited</button>
            </div>

            <div id="review-list" class="space-y-4"></div>
        </section>

    </main>

<script>
/* ==========================================================================
   BANK: 100 QUESTIONS WITH DETAILED RATIONALES
   ========================================================================== */
const QUESTIONS = [
    // L11: BIODIVERSITY (25 Qs)
    { id:1, l:"L11", q:"What is meant by 'Genetic Diversity' within a population?", o:[{t:"Variations in genes among individuals of the same species", c:true},{t:"The total number of different species", c:false},{t:"The variety of trophic levels in an ecosystem", c:false},{t:"Variation between different kingdoms", c:false}], r:"Genetic diversity measures variation within a single species (e.g., hair color, height, blood type). It is crucial for survival in changing environments." },
    { id:2, l:"L11", q:"Mating between closely related individuals is known as:", o:[{t:"Outbreeding", c:false},{t:"Inbreeding", c:true},{t:"Crossbreeding", c:false},{t:"Hybridization", c:false}], r:"Inbreeding results from small populations and increases the risk of genetic diseases such as hemophilia or cystic fibrosis." },
    { id:3, l:"L11", q:"What is the primary benefit of 'Outbreeding'?", o:[{t:"It creates smaller individuals", c:false},{t:"It maximizes genetic diversity", c:true},{t:"It leads to localized endemism", c:false},{t:"It slows down the birth rate", c:false}], r:"Outbreeding occurs through the sexual reproduction of individuals that are not closely related, which increases genetic health." },
    { id:4, l:"L11", q:"What defines an 'Endemic species'?", o:[{t:"A species found worldwide", c:false},{t:"Organisms found only in specific, localized areas", c:true},{t:"A species introduced by human activity", c:false},{t:"A species that has gone extinct", c:false}], r:"Endemic species have highly restricted ranges. Examples include Jordan's salamander, found only in the southern Appalachians." },
    { id:5, l:"L11", q:"Species diversity includes which two components?", o:[{t:"Richness and Rarity", c:false},{t:"Number of species and their relative abundance", c:true},{t:"Genetic health and age", c:false},{t:"Size of individuals and weight", c:false}], r:"It's not just the count of species (richness), but also how common or rare each species is in that area." },
    { id:6, l:"L11", q:"Ecological diversity includes the variety of habitats, niches, and:", o:[{t:"Blood types", c:false},{t:"Trophic levels and community interactions", c:true},{t:"Individual genes", c:false},{t:"Continental plates", c:false}], r:"Ecological diversity focuses on the functional variety of an entire community and its structure." },
    { id:7, l:"L11", q:"Which taxonomic group contains the highest number of known species?", o:[{t:"Plants", c:false},{t:"Fungi", c:false},{t:"Insects", c:true},{t:"Mammals", c:false}], r:"There are roughly 1 million known insect species, far exceeding any other animal group." },
    { id:8, l:"L11", q:"Biodiversity richness generally increases toward the:", o:[{t:"Poles", c:false},{t:"Equator", c:true},{t:"High altitudes", c:false},{t:"Deep ocean floors", c:false}], r:"The Latitudinal Diversity Gradient shows that species numbers (ants, birds, trees) increase markedly near the equator." },
    { id:9, l:"L11", q:"The hypothesis that tropical habitats have more species because they are older is called:", o:[{t:"Equilibrium View", c:false},{t:"Time View", c:true},{t:"Niche View", c:false},{t:"Latitudinal View", c:false}], r:"The Time View states that tropical areas haven't been disrupted by glaciers, allowing a longer span for speciation." },
    { id:10, l:"L11", q:"What is 'Alpha Diversity'?", o:[{t:"Local diversity in a homogeneous habitat", c:true},{t:"Total diversity in a region", c:false},{t:"Diversity of apex predators", c:false},{t:"Genetic variation in a group", c:false}], r:"Alpha diversity measures the number of species in a small, uniform area." },
    { id:11, l:"L11", q:"According to MacArthur-Wilson, where does the equilibrium number of species on an island occur?", o:[{t:"At the colonization peak", c:false},{t:"Where colonization and extinction rates cross", c:true},{t:"When the island reaches 1,000 species", c:false},{t:"When the mainland disappears", c:false}], r:"Equilibrium (\\(\\hat{S}\\)) is the balance point between species arriving and species dying out." },
    { id:12, l:"L11", q:"How does island size affect the MacArthur-Wilson model?", o:[{t:"Small islands have higher extinction rates", c:true},{t:"Large islands have fewer niches", c:false},{t:"Size only affects colonization", c:false},{t:"Size has no effect", c:false}], r:"Small islands support fewer species because their extinction rates are higher than large islands." },
    { id:13, l:"L11", q:"How does island isolation (distance from mainland) affect biodiversity?", o:[{t:"Far islands have higher colonization", c:false},{t:"Near islands have higher colonization", c:true},{t:"Isolation only affects plants", c:false},{t:"Distance affects extinction only", c:false}], r:"Islands closer to the mainland are reached by more colonizing species per year." },
    { id:14, l:"L11", q:"The 25 global biodiversity hotspots cover only 1.4% of land but contain ___ of all plant species.", o:[{t:"10%", c:false},{t:"25%", c:false},{t:"44%", c:true},{t:"90%", c:false}], r:"Hotspots are high-priority conservation areas due to their extreme density of species and endemism." },
    { id:15, l:"L11", q:"Which US state is a major hotspot for salamander, mussel, and fish diversity?", o:[{t:"California", c:false},{t:"Georgia", c:true},{t:"Maine", c:false},{t:"Kansas", c:false}], r:"Georgia's freshwater systems and mountains host exceptional aquatic and amphibian variety." },
    { id:16, l:"L11", q:"The structural complexity of a tropical forest compared to a grassland results in:", o:[{t:"Fewer habitats", c:false},{t:"Many more niches and species", c:true},{t:"Less sunlight", c:false},{t:"Higher extinction", c:false}], r:"Complexity in physical structure creates more specialized spaces for different species to live." },
    { id:17, l:"L11", q:"According to the 'Equilibrium View', why are the tropics so diverse?", o:[{t:"Speciation rates are faster than extinction rates", c:true},{t:"Species never go extinct there", c:false},{t:"Only exotic species live there", c:false},{t:"There is no inbreeding", c:false}], r:"This view suggests factors adding species operate at a faster pace in tropical climates." },
    { id:18, l:"L11", q:"In North America, isoclines show that mammal species richness increases moving:", o:[{t:"North", c:false},{t:"South toward the equator", c:true},{t:"East", c:false},{t:"West", c:false}], r:"Isoclines connect points of equal richness; they converge as you move toward Mexico/equator." },
    { id:19, l:"L11", q:"Which taxonomic group has approximately 310,000 known species?", o:[{t:"Insects", c:false},{t:"Plants", c:true},{t:"Birds", c:false},{t:"Fungi", c:false}], r:"While numerous, plants have far fewer known species than insects (~1M)." },
    { id:20, l:"L11", q:"What describes 'Gamma Diversity'?", o:[{t:"Regional diversity across all habitats in an area", c:true},{t:"Diversity within one pond", c:false},{t:"Diversity of a single gene", c:false},{t:"The birth rate of a species", c:false}], r:"Gamma measures the total diversity in all habitats within a large, barrier-free geographic area." },
    { id:21, l:"L11", q:"Which is a wisely chosen 'flagship species' according to the course?", o:[{t:"A house fly", c:false},{t:"A giant panda", c:true},{t:"A mosquito", c:false},{t:"A common rat", c:false}], r:"Flagship species must be charismatic ambassadors that symbolize a cause or habitat to the public." },
    { id:22, l:"L11", q:"Approximately how many species are estimated to currently exist on Earth?", o:[{t:"1 million", c:false},{t:"10 million or more", c:true},{t:"Only 50,000", c:false},{t:"500,000", c:false}], r:"While ~1.5-2M are known, estimates suggest 10 million or many more exist." },
    { id:23, l:"L11", q:"Small populations are most at risk of:", o:[{t:"High outbreeding", c:false},{t:"Inbreeding and genetic diseases", c:true},{t:"Over-colonization", c:false},{t:"Infinite speciation", c:false}], r:"Limited partners force mating with relatives, decreasing genetic health." },
    { id:24, l:"L11", q:"A coral reef (A) vs a sandy bottom (B) shows that (A) has more:", o:[{t:"Water", c:false},{t:"Structural complexity", c:true},{t:"Alpha extinction", c:false},{t:"Endemic mammals", c:false}], r:"The physical architecture of the reef creates more habitats." },
    { id:25, l:"L11", q:"At no time in Earth's history has there been ___ species than now.", o:[{t:"Fewer", c:false},{t:"More", c:true},{t:"Larger", c:false},{t:"Cleaner", c:false}], r:"Despite current losses, Earth's current diversity is at an all-time historical peak." },

    // L12: EXTINCTIONS (25 Qs)
    { id:26, l:"L12", q:"Extinction is 'normal'; what percentage of species ever to live are now extinct?", o:[{t:"50%", c:false},{t:"10%", c:false},{t:"Over 99%", c:true},{t:"20%", c:false}], r:"By most estimates, almost every lineage that ever appeared on Earth has eventually gone extinct." },
    { id:27, l:"L12", q:"A mass 'extinction event' is defined by the loss of over ___% of animal species.", o:[{t:"10%", c:false},{t:"25%", c:false},{t:"50%", c:true},{t:"90%", c:false}], r:"There have been 5 major events in the past 540 million years meeting this criteria." },
    { id:28, l:"L12", q:"The most recent major extinction event (K-T) occurred ___ years ago.", o:[{t:"10,000", c:false},{t:"65.5 million", c:true},{t:"290 million", c:false},{t:"1.6 million", c:false}], r:"The Cretaceous-Tertiary event was likely caused by an asteroid impact in the Gulf of Mexico." },
    { id:29, l:"L12", q:"Which was the largest extinction event, losing 90-95% of marine life?", o:[{t:"K-T", c:false},{t:"Permian", c:true},{t:"Ordovician", c:false},{t:"Triassic", c:false}], r:"The Permian extinction (290M years ago) was the most devastating event recorded." },
    { id:30, l:"L12", q:"What is the average 'background rate' of extinction?", o:[{t:"1 species / day", c:false},{t:"1 species / 10 million / year", c:true},{t:"1,000 species / year", c:false},{t:"10 species / 1 million / year", c:false}], r:"This is the natural rate that occurred before human appearance." },
    { id:31, l:"L12", q:"Current extinction rates are estimated at ___ times the background rate.", o:[{t:"2x", c:false},{t:"10x", c:false},{t:"1,000 to 10,000x", c:true},{t:"100x", c:false}], r:"Human activities (HIPPCO) have radically accelerated the rate of species loss." },
    { id:32, l:"L12", q:"Which bird, once common in the billions, died out in captivity in 1914?", o:[{t:"Carolina Parakeet", c:false},{t:"Passenger Pigeon", c:true},{t:"Dodo", c:false},{t:"Whooping Crane", c:false}], r:"Martha, the last passenger pigeon, marked the end of what was once the most common bird on Earth." },
    { id:33, l:"L12", q:"What caused the extinction of the Carolina Parakeet?", o:[{t:"Contact with poultry disease", c:true},{t:"A giant snake from Guam", c:false},{t:"Inbreeding with pigeons", c:false},{t:"A localized asteroid", c:false}], r:"They were shot as pests, hunted for feathers, and suffered from habitat loss and disease." },
    { id:34, l:"L12", q:"Which trait increases a species' risk of extinction?", o:[{t:"Broad diet", c:false},{t:"Large home ranges / fragmentation", c:true},{t:"High reproductive rate", c:false},{t:"Small body size", c:false}], r:"Large areas needed by animals (like the Florida Panther) are easily cut off by development (fragmentation)." },
    { id:35, l:"L12", q:"Seasonal migrants (like the Whimbrel) are at risk because:", o:[{t:"They fly too much", c:false},{t:"Loss of one habitat prevents the species from persisting", c:true},{t:"They get lost easily", c:false},{t:"They have no genetic diversity", c:false}], r:"Migrants depend on multiple healthy habitats across their route; if one link breaks, they fail." },
    { id:36, l:"L12", q:"What is a 'Coextinction'?", o:[{t:"Two species living together", c:false},{t:"The loss of a predator after its only prey goes extinct", c:true},{t:"Extinction due to climate", c:false},{t:"A mass death of plants", c:false}], r:"Example: Haast's Eagle went extinct after the Moa was wiped out by settlers in New Zealand." },
    { id:37, l:"L12", q:"The IUCN Red List 'Critically Endangered' status means ___ likelihood of extinction in 10 years.", o:[{t:"10%", c:false},{t:"20%", c:false},{t:"50%", c:true},{t:"100%", c:false}], r:"Criteria for the highest risk category before total extinction." },
    { id:38, l:"L12", q:"The Endangered Species Act (ESA) was enacted in:", o:[{t:"1914", c:false},{t:"1973", c:true},{t:"1992", c:false},{t:"1950", c:false}], r:"This US law requires the identification and protection of lands necessary to recover species." },
    { id:39, l:"L12", q:"Why did the Snail Darter fish case reach the Supreme Court?", o:[{t:"It was poisonous", c:false},{t:"It stopped a $100M hydroelectric dam", c:true},{t:"It was a pet", c:false},{t:"It was invasive", c:false}], r:"The ESA halted the Tellico Dam construction because it threatened the tiny fish's habitat." },
    { id:40, l:"L12", q:"Why was listing the Polar Bear as threatened in 2007 'problematic'?", o:[{t:"It didn't eat fish", c:false},{t:"It linked $CO_2$ and climate change to habitat loss", c:true},{t:"It was too popular", c:false},{t:"It was already extinct", c:false}], r:"Listing the bear officially acknowledged that greenhouse gases were destroying its hunting ice." },
    { id:41, l:"L12", q:"How many species had been delisted from the ESA due to recovery by 2012?", o:[{t:"1", c:false},{t:"28", c:true},{t:"56", c:false},{t:"100", c:false}], r:"Out of 56 total delistings, 28 were successful recoveries (like the Bald Eagle)." },
    { id:42, l:"L12", q:"What was used to re-teach migration to Whooping Cranes?", o:[{t:"Other cranes", c:false},{t:"Ultralight aircraft", c:true},{t:"Helicopters", c:false},{t:"Magnetic poles", c:false}], r:"Pilots in ultralights led cranes from Wisconsin to Florida to restore the migratory path." },
    { id:43, l:"L12", q:"California condors were saved from fewer than ___ individuals in the wild.", o:[{t:"100", c:false},{t:"20", c:true},{t:"500", c:false},{t:"50", c:false}], r:"Intensive captive breeding brought them back from the absolute brink of extinction." },
    { id:44, l:"L12", q:"Which bird was overhunted for meat, fat, oil, and feathers?", o:[{t:"Great Auk", c:true},{t:"Moa", c:false},{t:"California Condor", c:false},{t:"Goliath Butterfly", c:false}], r:"The Great Auk was a penguin-like bird driven to extinction by commercial exploitation." },
    { id:45, l:"L12", q:"What does 'extirpated' mean?", o:[{t:"Totally dead globally", c:false},{t:"Locally extinct but still existing elsewhere", c:true},{t:"An invasive species", c:false},{t:"A hybrid species", c:false}], r:"Example: Many mammals are gone from the Everglades but still live in other forests." },
    { id:46, l:"L12", q:"Loss of sea ice affects polar bears because they use it for:", o:[{t:"Drinking", c:false},{t:"Hunting", c:true},{t:"Sleeping only", c:false},{t:"Growing fur", c:false}], r:"Bears need the ice platform to catch seals; without it, they cannot hunt effectively." },
    { id:47, l:"L12", q:"What is the #1 threat to biodiversity worldwide?", o:[{t:"Pollution", c:false},{t:"Habitat loss and alteration", c:true},{t:"Overfishing", c:false},{t:"Climate change", c:false}], r:"Loss of habitat (e.g., >90% of Madagascar's forests) is the leading cause of extinction." },
    { id:48, l:"L12", q:"Which group's loss in the Triassic allowed dinosaurs to evolve?", o:[{t:"Marine snails", c:false},{t:"Crurotarsans (crocodile ancestors)", c:true},{t:"Mammals", c:false},{t:"Insects", c:false}], r:"The disappearance of a prominent reptile group opened the niche for dinosaurs." },
    { id:49, l:"L12", q:"The Ordovician extinction was characterized by a loss of over ___ marine species.", o:[{t:"50%", c:false},{t:"85%", c:true},{t:"95%", c:false},{t:"10%", c:false}], r:"Data from Slide 8 infographic." },
    { id:50, l:"L12", q:"In terms of ESA protection, 'critical habitat' can fall on:", o:[{t:"Only public land", c:false},{t:"Only private land", c:false},{t:"Both public or private land", c:true},{t:"Only inside zoos", c:false}], r:"The law applies regardless of land ownership if the area is essential for the species." },

    // L13: INVASIVES (25 Qs)
    { id:51, l:"L13", q:"What defines an 'Invasive Species'?", o:[{t:"Any non-native species", c:false},{t:"A species causing economic or environmental harm", c:true},{t:"A species that only eats plants", c:false},{t:"A species found in zoos", c:false}], r:"It must be 'alien' (exotic) and specifically 'harmful'." },
    { id:52, l:"L13", q:"Why do most introductions of exotic species fail?", o:[{t:"Low density (finding a mate) and chance", c:true},{t:"They are too large", c:false},{t:"They eat too much", c:false},{t:"Humans always catch them", c:false}], r:"Only a tiny fraction of introduced species successfully establish populations." },
    { id:53, l:"L13", q:"How was the Brown Tree Snake introduced to Guam?", o:[{t:"As a pet", c:false},{t:"In military shipping cargo", c:true},{t:"For pest control", c:false},{t:"It swam there", c:false}], r:"It arrived inadvertently in the 1950s from New Guinea." },
    { id:54, l:"L13", q:"The Brown Tree Snake led to the loss of ___ of 18 native birds in Guam.", o:[{t:"2", c:false},{t:"9", c:true},{t:"18", c:false},{t:"5", c:false}], r:"It wiped out half of the island's native avian diversity." },
    { id:55, l:"L13", q:"What was parachuted into Guam to attempt snake eradication?", o:[{t:"Poison gas", c:false},{t:"Toxic Mice (containing Acetaminophen/Aspirin)", c:true},{t:"Electric traps", c:false},{t:"Bird lures", c:false}], r:"The snakes are uniquely sensitive to acetaminophen; dead mice were used as bait." },

    { id:63, l:"L13", q:"Which invasive plant is known for covering entire buildings and cars?", o:[{t:"Ivy", c:false},{t:"Kudzu", c:true},{t:"Bamboo", c:false},{t:"Moss", c:false}], r:"The 'vine that ate the South' is a classic example of a runaway invasive plant." },

/* ==========================================================================
   APP LOGIC
   ========================================================================== */
let state = { answers: {}, bookmarks: [] };
let quizList = [];
let qIdx = 0;
let revMode = 'errors';
let shuffleOn = false;

function load() {
    const saved = localStorage.getItem('ecol_v5_study');
    if(saved) state = JSON.parse(saved);
}

function save() {
    localStorage.setItem('ecol_v5_study', JSON.stringify(state));
    updateStats();
}

function nav(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const match = btn.dataset.target === id;
        btn.classList.toggle('text-blue-600', match);
        btn.classList.toggle('text-slate-400', !match);
    });
    if(id === 'review') renderReview();
    window.scrollTo(0,0);
}

function updateStats() {
    const total = QUESTIONS.length;
    const answeredCount = Object.keys(state.answers).length;
    const correctCount = Object.values(state.answers).filter(v => v === true).length;
    
    document.getElementById('dash-prog').innerText = `${answeredCount}/${total}`;
    document.getElementById('dash-success').innerText = answeredCount ? Math.round((correctCount/answeredCount)*100)+'%' : '0%';
    document.getElementById('dash-errors').innerText = answeredCount - correctCount;
    document.getElementById('dash-bookmarks').innerText = state.bookmarks.length;

    let html = '';
    ['L11','L12','L13','L14'].forEach(l => {
        const lQs = QUESTIONS.filter(q => q.l === l);
        const done = lQs.filter(q => state.answers[q.id] !== undefined).length;
        const p = Math.round((done/lQs.length)*100);
        html += `<div><div class="flex justify-between text-[10px] font-bold mb-1"><span>${l}</span><span>${p}%</span></div>
                 <div class="h-1.5 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${p}%"></div></div></div>`;
    });
    document.getElementById('chapter-stats').innerHTML = html;
}

function toggleShuffle() {
    shuffleOn = !shuffleOn;
    document.getElementById('shuffle-status').innerText = shuffleOn ? "ON" : "OFF";
    document.getElementById('btn-shuffle').classList.toggle('bg-blue-600', shuffleOn);
    document.getElementById('btn-shuffle').classList.toggle('text-white', shuffleOn);
    startQuiz();
}

function startQuiz() {
    const filter = document.getElementById('quiz-filter').value;
    quizList = filter === 'all' ? [...QUESTIONS] : QUESTIONS.filter(q => q.l === filter);
    if(shuffleOn) quizList.sort(() => Math.random() - 0.5);
    qIdx = 0;
    renderQ();
}

function renderQ() {
    const q = quizList[qIdx];
    const ui = document.getElementById('quiz-container');
    const isBook = state.bookmarks.includes(q.id);
    const userAns = state.answers[q.id];

    let html = `
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-black tracking-widest text-blue-500 uppercase">${q.l}</span>
            <button onclick="toggleBook(${q.id})" class="text-xl ${isBook?'text-amber-400':'text-gray-200'}"><i class="fas fa-bookmark"></i></button>
        </div>
        <h3 class="text-xl font-bold mb-8 leading-tight">${q.q}</h3>
        <div class="space-y-3">
    `;

    q.o.forEach(opt => {
        let cls = "w-full text-left p-4 border rounded-xl transition hover:bg-slate-50";
        if(userAns !== undefined) {
            if(opt.c) cls = "w-full text-left p-4 border-2 rounded-xl ans-correct";
            else if(!opt.c && userAns === false) cls = "w-full text-left p-4 border-2 rounded-xl ans-wrong";
            else cls = "w-full text-left p-4 border rounded-xl ans-neutral";
        }
        html += `<button onclick="handleAns(${q.id}, ${opt.c})" ${userAns!==undefined?'disabled':''} class="${cls}">${opt.t}</button>`;
    });

    html += `</div>`;
    if(userAns !== undefined) {
        html += `<div class="mt-8 p-5 bg-blue-50 rounded-2xl border border-blue-100">
            <p class="text-[10px] font-black uppercase text-blue-400 mb-2">Rationale</p>
            <p class="text-sm font-medium text-blue-900 leading-relaxed">${q.r}</p>
        </div>`;
    }

    ui.innerHTML = html;
    document.getElementById('quiz-counter').innerText = `${qIdx+1} / ${quizList.length}`;
    if(window.MathJax) MathJax.typesetPromise();
}

function handleAns(id, correct) {
    state.answers[id] = correct;
    save();
    renderQ();
}

function navQ(dir) {
    qIdx += dir;
    if(qIdx < 0) qIdx = 0;
    if(qIdx >= quizList.length) qIdx = quizList.length - 1;
    renderQ();
}

function nextQuestion() { navQ(1); }
function prevQuestion() { navQ(-1); }

function toggleBook(id) {
    const i = state.bookmarks.indexOf(id);
    if(i > -1) state.bookmarks.splice(i,1); else state.bookmarks.push(id);
    save();
    renderQ();
}

function setReviewMode(m) {
    revMode = m;
    document.getElementById('btn-rev-errors').className = revMode==='errors' ? 'font-bold text-rose-600 border-b-2 border-rose-600 pb-1':'font-bold text-slate-400 pb-1';
    document.getElementById('btn-rev-bookmarks').className = revMode==='bookmarks' ? 'font-bold text-amber-500 border-b-2 border-amber-500 pb-1':'font-bold text-slate-400 pb-1';
    renderReview();
}

function renderReview() {
    const list = document.getElementById('review-list');
    const filtered = revMode === 'errors' ? QUESTIONS.filter(q => state.answers[q.id] === false) : QUESTIONS.filter(q => state.bookmarks.includes(q.id));
    if(!filtered.length) { list.innerHTML = `<p class="py-20 text-center text-slate-300 font-bold">List empty.</p>`; return; }
    
    list.innerHTML = filtered.map(q => `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <div class="text-[10px] font-black text-blue-400 mb-1">${q.l}</div>
            <h4 class="font-bold mb-4">${q.q}</h4>
            <div class="text-xs font-bold text-emerald-600 mb-2">Answer: ${q.o.find(x=>x.c).t}</div>
            <p class="text-xs text-slate-500 leading-relaxed">${q.r}</p>
        </div>
    `).join('');
}

function resetData() {
    if(confirm('Delete all progress?')) { state={answers:{}, bookmarks:[]}; save(); location.reload(); }
}

function init() {
    load();
    updateStats();
    startQuiz();

    document.getElementById('flashcards-grid').innerHTML = FLASHCARDS.map(f => `
        <div class="flip-card" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front font-bold text-sm tracking-tight">${f.f}</div>
                <div class="flip-card-back text-[10px] leading-relaxed p-5 font-semibold">${f.b}</div>
            </div>
        </div>
    `).join('');
}

init();
</script>
