<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOL 1000 - Academic Review Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .flip-card { perspective: 1000px; height: 240px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .flip-card-front { background-color: #ffffff; color: #1e293b; border: 2px solid #e2e8f0; }
        .flip-card-back { background-color: #1e40af; color: white; transform: rotateY(180deg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* High-Quality Feedback Colors */
        .ans-correct { background-color: #ecfdf5 !important; border-color: #10b981 !important; color: #065f46 !important; font-weight: 700; border-width: 2px; }
        .ans-wrong { background-color: #fff1f2 !important; border-color: #f43f5e !important; color: #9f1239 !important; font-weight: 700; border-width: 2px; }
        .ans-neutral { opacity: 0.4; pointer-events: none; border-color: #f1f5f9 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-20 md:pb-0 md:pt-16">

    <!-- Navigation -->
    <nav class="fixed bottom-0 w-full bg-white shadow-lg border-t md:top-0 md:bottom-auto md:border-b z-50">
        <div class="max-w-5xl mx-auto flex justify-around md:justify-center md:space-x-12 p-3">
            <button onclick="nav('dashboard')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="dashboard"><i class="fas fa-home text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-widest">Dashboard</span></button>
            <button onclick="nav('quiz')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="quiz"><i class="fas fa-tasks text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-widest">Quiz</span></button>
            <button onclick="nav('flashcards')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="flashcards"><i class="fas fa-clone text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-widest">Cards</span></button>
            <button onclick="nav('review')" class="nav-btn flex flex-col items-center text-slate-400 hover:text-blue-600 transition" data-target="review"><i class="fas fa-history text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-widest">Review</span></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pt-6 md:pt-10">
        
        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content active">
            <h1 class="text-3xl font-black text-slate-900 mb-1">ECOL 1000</h1>
            <p class="text-blue-600 font-bold mb-8 uppercase tracking-widest text-sm">Ecological Basis of Environmental Issues</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Progress</p>
                    <p class="text-3xl font-black text-slate-800" id="dash-prog">0/100</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Score</p>
                    <p class="text-3xl font-black text-emerald-600" id="dash-success">0%</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Mistakes</p>
                    <p class="text-3xl font-black text-rose-500" id="dash-errors">0</p>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-[10px] uppercase text-slate-400 font-black mb-1">Saved</p>
                    <p class="text-3xl font-black text-amber-500" id="dash-bookmarks">0</p>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-8">
                <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">Lecture Mastery</h2>
                <div id="chapter-stats" class="space-y-6"></div>
            </div>
            
            <div class="flex justify-center">
                <button onclick="resetData()" class="text-xs text-slate-300 hover:text-rose-500 transition underline tracking-widest uppercase font-bold">Wipe Local Progress</button>
            </div>
        </section>

        <!-- QUIZ ENGINE -->
        <section id="quiz" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Study Bank</h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <button id="btn-shuffle" onclick="toggleShuffle()" class="flex-1 md:flex-none px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-black transition hover:bg-slate-50 uppercase tracking-widest"><i class="fas fa-random mr-2"></i>Shuffle: <span id="shuffle-status">OFF</span></button>
                    <select id="quiz-filter" class="flex-1 md:flex-none p-2 border border-slate-200 rounded-xl text-xs font-black bg-white uppercase tracking-widest" onchange="startQuiz()">
                        <option value="all">All Lectures</option>
                        <option value="L11">L11 - Biodiversity</option>
                        <option value="L12">L12 - Extinctions</option>
                        <option value="L13">L13 - Invasives</option>
                        <option value="L14">L14 - Conservation</option>
                    </select>
                </div>
            </div>
            
            <div id="quiz-container" class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-200 min-h-[400px]"></div>
            
            <div class="flex justify-between items-center mt-8">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition shadow-sm"><i class="fas fa-chevron-left"></i></button>
                <div class="text-center">
                    <span id="quiz-counter" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Question 1 / 100</span>
                </div>
                <button onclick="nextQuestion()" class="w-14 h-14 flex items-center justify-center bg-blue-600 text-white rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-100 transition"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <!-- FLASHCARDS -->
        <section id="flashcards" class="tab-content">
            <div class="mb-8">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Vocabulary (32 Terms)</h2>
                <p class="text-slate-500 text-sm">Click card to reveal definition.</p>
            </div>
            <div id="flashcards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- REVIEW CENTER -->
        <section id="review" class="tab-content">
            <h2 class="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tighter">Focused Review</h2>
            <p class="text-slate-500 text-sm mb-8 font-medium">Revisit questions you missed or saved for later.</p>
            
            <div class="flex space-x-2 mb-8 bg-slate-200 p-1 rounded-2xl w-fit">
                <button onclick="setReviewMode('errors')" id="btn-rev-errors" class="px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-rose-600">Mistakes</button>
                <button onclick="setReviewMode('bookmarks')" id="btn-rev-bookmarks" class="px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500">Favorited</button>
            </div>

            <div id="review-list" class="space-y-6"></div>
        </section>

    </main>

<script>
/* ==========================================================================
   BANK: 100 QUESTIONS + 32 FLASHCARDS (FULL EXPLANATIONS)
   ========================================================================== */
const QUESTIONS = [
    // L11: BIODIVERSITY (25 Qs)
    { id:1, l:"L11", q:"How is biodiversity measured within a population?", o:[{t:"Genetic variation among individuals", c:true},{t:"Total number of species", c:false},{t:"Variety of habitats", c:false},{t:"Latitude gradient", c:false}], r:"Within populations, biodiversity is the genetic diversity. This includes variations such as hair color, height, and blood type among individuals." },
    { id:2, l:"L11", q:"Inbreeding results from small populations and increases the chances of:", o:[{t:"New species emerging", c:false},{t:"Genetic diseases", c:true},{t:"High outbreeding", c:false},{t:"Larger individuals", c:false}], r:"Inbreeding (mating between close relatives) reduces genetic variation and can lead to conditions like hemophilia or cystic fibrosis." },
    { id:3, l:"L11", q:"Which process maximizes genetic diversity in a population?", o:[{t:"Inbreeding", c:false},{t:"Outbreeding", c:true},{t:"Cloning", c:false},{t:"Habitat fragmentation", c:false}], r:"Outbreeding, which is sexual reproduction between non-closely related individuals, is the best way to maintain a healthy gene pool." },
    { id:4, l:"L11", q:"Endemic species are characterized as being:", o:[{t:"Found worldwide", c:false},{t:"Found only in specific, localized areas", c:true},{t:"Invasive in new territories", c:false},{t:"Extirpated globally", c:false}], r:"Endemic species have a very restricted range. For example, Jordan's salamander is only found in the moist forests of the southern Appalachians." },
    { id:5, l:"L11", q:"Species diversity consists of richness and:", o:[{t:"Genetic variation", c:false},{t:"Relative abundance", c:true},{t:"Migration distance", c:false},{t:"Trophic level", c:false}], r:"Species diversity isn't just about counting how many types there are (richness), but also how many individuals of each type exist (relative abundance)." },
    { id:6, l:"L11", q:"Ecological diversity includes variety in habitats, niches, and:", o:[{t:"Blood types", c:false},{t:"Trophic levels and community interactions", c:true},{t:"Gene mutations", c:false},{t:"Weather patterns", c:false}], r:"Ecological diversity looks at the complex interactions within a community, rather than just individual species." },
    { id:7, l:"L11", q:"Which group accounts for most global biodiversity known to science?", o:[{t:"Vertebrates", c:false},{t:"Plants", c:false},{t:"Insects", c:true},{t:"Fungi", c:false}], r:"Insects have over 1 million known species and estimates of up to 9 million total, making them the most diverse group on Earth." },
    { id:8, l:"L11", q:"Species richness generally increases markedly as you move toward:", o:[{t:"The poles", c:false},{t:"The equator", c:true},{t:"High altitudes", c:false},{t:"Ocean trenches", c:false}], r:"Across most groups (ants, birds, trees), diversity follows a latitudinal gradient, peaking at the equator." },
    { id:9, l:"L11", q:"What is the 'Time View' explanation for tropical diversity?", o:[{t:"Tropical habitats are younger", c:false},{t:"Tropical habitats are older and had more time to accumulate species", c:true},{t:"Tropics have faster clocks", c:false},{t:"Tropics have shorter days", c:false}], r:"The Time View suggests that because tropical areas weren't covered by ice during glaciation, speciation has continued for a longer span of time." },
    { id:10, l:"L11", q:"According to MacArthur-Wilson, where is the balance point of species on an island?", o:[{t:"The peak of colonization", c:false},{t:"Where colonization and extinction lines cross", c:true},{t:"At the start of extinction", c:false},{t:"When the island is full", c:false}], r:"The equilibrium number (\\(\\hat{S}\\)) is determined by the specific point where the rates of colonization and extinction are equal." },
    { id:11, l:"L11", q:"Large islands generally support more species because:", o:[{t:"They are closer to land", c:false},{t:"They have lower extinction rates", c:true},{t:"They have no predators", c:false},{t:"They are warmer", c:false}], r:"Larger islands have more resources and larger populations, which significantly reduces the probability of a species going extinct." },
    { id:12, l:"L11", q:"The structural complexity of a habitat like a coral reef results in:", o:[{t:"Fewer habitats", c:false},{t:"Many more habitats and niches for species", c:true},{t:"Less sunlight", c:false},{t:"Higher colonization speed", c:false}], r:"Physical complexity (like the branches of coral or trees) creates many micro-habitats that can support a wider variety of life." },
    { id:13, l:"L11", q:"Alpha diversity is a measure of:", o:[{t:"Regional diversity", c:false},{t:"Local diversity in a small area of homogeneous habitat", c:true},{t:"Genetic health", c:false},{t:"Continental diversity", c:false}], r:"Alpha is the most local scale of diversity measurement used by ecologists." },
    { id:14, l:"L11", q:"What is 'Gamma Diversity'?", o:[{t:"Diversity in one pond", c:false},{t:"Total species observed in all habitats within a large regional area", c:true},{t:"Diversity between parents", c:false},{t:"The number of predators", c:false}], r:"Gamma diversity looks at the big picture, encompassing all different types of habitats within a barrier-free geographic region." },
    { id:15, l:"L11", q:"The 25 global hotspots of biodiversity occupy only ___ of the planet's land area.", o:[{t:"10%", c:false},{t:"1.4%", c:true},{t:"50%", c:false},{t:"25%", c:false}], r:"Despite their tiny size, these 25 regions hold 44% of all plant species and 35% of all terrestrial vertebrates." },
    { id:16, l:"L11", q:"Jordan's salamander is found ONLY in the moisture-rich forests of which US region?", o:[{t:"Rocky Mountains", c:false},{t:"Southern Appalachian Mountains", c:true},{t:"Everglades", c:false},{t:"Sierra Nevada", c:false}], r:"It is one of 20 endemic species of salamanders that live only in that specific humid mountain range." },
    { id:17, l:"L11", q:"Which island type would MacArthur-Wilson predict to have the LOWEST biodiversity?", o:[{t:"Large island near mainland", c:false},{t:"Small island far from mainland", c:true},{t:"Small island near mainland", c:false},{t:"Large island far from mainland", c:false}], r:"A small, far island has low colonization rates and high extinction rates, leading to minimal species counts." },
    { id:18, l:"L11", q:"Georgia is considered a diversity hotspot for which of these groups?", o:[{t:"Polar bears", c:false},{t:"Freshwater mussels", c:true},{t:"Penguins", c:false},{t:"Kangaroos", c:false}], r:"Georgia has some of the highest freshwater fish and mussel diversity in the world as shown in the lecture slides." },
    { id:19, l:"L11", q:"Approximately how many species of plants are known currently?", o:[{t:"10,000", c:false},{t:"310,129", c:true},{t:"1,000,000", c:false},{t:"50,000", c:false}], r:"Scientists have identified roughly 310,000 species, though estimates suggest another 400,000 might remain undiscovered." },
    { id:20, l:"L11", q:"Mating between non-closely related individuals is called:", o:[{t:"Inbreeding", c:false},{t:"Outbreeding", c:true},{t:"Speciation", c:false},{t:"Cloning", c:false}], r:"Outbreeding through sexual reproduction ensures genetic health and population resilience." },
    { id:21, l:"L11", q:"According to the 'Equilibrium View', tropical diversity reaches a balance where:", o:[{t:"Speciation equals extinction", c:false},{t:"Speciation rate is faster than extinction rate", c:true},{t:"Extinction is zero", c:false},{t:"Migration stops", c:false}], r:"This theory suggests that the factors adding species (speciation) simply operate at a higher frequency than the factors removing them." },
    { id:22, l:"L11", q:"Which island biogeography factor increases the colonization rate?", o:[{t:"Large size", c:false},{t:"Close distance to the mainland", c:true},{t:"High altitude", c:false},{t:"Sandy soil", c:false}], r:"Proximity allows more individuals from the mainland to successfully migrate to the island." },
    { id:23, l:"L11", q:"A 'hotspot' must have high diversity and high ___.", o:[{t:"Humidity", c:false},{t:"Endemism", c:true},{t:"Agriculture", c:false},{t:"Pollution", c:false}], r:"Endemism (species found nowhere else) is a primary requirement for an area to be labeled a biodiversity hotspot." },
    { id:24, l:"L11", q:"Genetic diversity is particularly important for survival in:", o:[{t:"Static environments", c:false},{t:"Changing environments", c:true},{t:"Cold climates only", c:false},{t:"Zoos", c:false}], r:"Variation allows a population to adapt when environmental conditions shift." },
    { id:25, l:"L11", q:"At no point in Earth's history have there been more species than:", o:[{t:"The Jurassic", c:false},{t:"The Cambrian", c:false},{t:"Right now", c:true},{t:"100 years ago", c:false}], r:"Despite current extinctions, our modern era represents the historical peak of biological diversity on Earth." },

    // L12: EXTINCTIONS (25 Qs)
    { id:26, l:"L12", q:"Extinction is normal; over ___ of species ever to live are now extinct.", o:[{t:"10%", c:false},{t:"50%", c:false},{t:"99%", c:true},{t:"20%", c:false}], r:"By most estimates, over 99% of all lineages that ever existed on our planet are gone." },
    { id:27, l:"L12", q:"A mass extinction event involves the loss of over ___% of animal species.", o:[{t:"10%", c:false},{t:"25%", c:false},{t:"50%", c:true},{t:"90%", c:false}], r:"There have been 5 such major events in the last 540 million years." },
    { id:28, l:"L12", q:"The largest extinction on record, losing 90-95% of marine species, was the:", o:[{t:"K-T", c:false},{t:"Permian", c:true},{t:"Ordovician", c:false},{t:"Devonian", c:false}], r:"The Permian extinction (approx 290M yrs ago) was the most severe event in Earth's history." },
    { id:29, l:"L12", q:"The most recent major extinction (K-T) occurred approx. how many years ago?", o:[{t:"10,000", c:false},{t:"65.5 million", c:true},{t:"290 million", c:false},{t:"1.6M", c:false}], r:"The K-T event was likely triggered by an asteroid impacting the Gulf of Mexico." },
    { id:30, l:"L12", q:"What is the natural 'background rate' of extinction?", o:[{t:"1 species / year", c:false},{t:"1 species / 10 million / year", c:true},{t:"100 species / year", c:false},{t:"1 species / century", c:false}], r:"This is the average rate at which species disappeared before human influence." },
    { id:31, l:"L12", q:"Current extinction rates are estimated at ___ times the background rate.", o:[{t:"10x", c:false},{t:"1,000 to 10,000x", c:true},{t:"100x", c:false},{t:"1,000,000x", c:false}], r:"Human activity (habitat loss, climate change) has radically accelerated the loss of species." },
    { id:32, l:"L12", q:"Which bird, once found in the billions, died in 1914?", o:[{t:"Carolina Parakeet", c:false},{t:"Passenger Pigeon", c:true},{t:"Moa", c:false},{t:"Great Auk", c:false}], r:"Martha, the last passenger pigeon, died in captivity in 1914. They were once the most common bird on Earth." },
    { id:33, l:"L12", q:"What caused the extinction of the Great Auk?", o:[{t:"Loss of ice", c:false},{t:"Commercial overhunting for feathers, meat, and oil", c:true},{t:"A giant snake", c:false},{t:"Volcanoes", c:false}], r:"The Great Auk was a penguin-like bird driven to extinction by humans who exploited it for oil and feathers." },
    { id:34, l:"L12", q:"'Extirpated' means that a species is:", o:[{t:"Extinct globally", c:false},{t:"Extinct locally but still exists elsewhere", c:true},{t:"Invasive", c:false},{t:"Recovered", c:false}], r:"Example: Many mammals are extirpated from the Everglades but live in other parts of the world." },
    { id:35, l:"L12", q:"Why is seasonal migration a risk factor for extinction?", o:[{t:"It uses too much energy", c:false},{t:"If one critical habitat disappears, the species cannot persist", c:true},{t:"Predators follow them", c:false},{t:"They get lost easily", c:false}], r:"Migrants (like the Whimbrel) require multiple healthy habitats. One missing link in the chain can end the species." },
    { id:36, l:"L12", q:"Large home ranges like the Florida panther's are threatened by:", o:[{t:"Disease", c:false},{t:"Habitat fragmentation", c:true},{t:"Inbreeding", c:false},{t:"Rain", c:false}], r:"Fragmentation breaks up large territories into small patches, trapping individuals and reducing their survival." },
    { id:37, l:"L12", q:"The IUCN defines 'Critically Endangered' as a ___ risk of extinction in 10 years.", o:[{t:"10%", c:false},{t:"20%", c:false},{t:"50%", c:true},{t:"100%", c:false}], r:"This is the highest threat classification for a living species on the Red List." },
    { id:38, l:"L12", q:"In what year was the Endangered Species Act (ESA) passed?", o:[{t:"1914", c:false},{t:"1973", c:true},{t:"1992", c:false},{t:"1850", c:false}], r:"The ESA was designed to halt extinction as a consequence of development, 'whatever the cost'." },
    { id:39, l:"L12", q:"Which tiny fish reached the Supreme Court under the ESA?", o:[{t:"Blue shiner", c:false},{t:"Snail Darter", c:true},{t:"Sturgeon", c:false},{t:"Amber darter", c:false}], r:"The Snail Darter's habitat halted a $100M dam construction project (Tellico Dam)." },
    { id:40, l:"L12", q:"Why was listing the Polar Bear as threatened in 2007 controversial?", o:[{t:"It didn't eat seals", c:false},{t:"It linked $CO_2$ and climate change to the ESA", c:true},{t:"It was invasive", c:false},{t:"It was already recovered", c:false}], r:"By listing the bear due to sea ice loss, the government acknowledged the legal link between greenhouse gases and habitat loss." },
    { id:41, l:"L12", q:"How many species had been delisted from the ESA due to 'recovery' by 2012?", o:[{t:"56", c:false},{t:"28", c:true},{t:"1", c:false},{t:"500", c:false}], r:"56 total species were delisted; 28 of those were because they successfully recovered to healthy levels." },
    { id:42, l:"L12", q:"What was used to teach Whooping Cranes to migrate?", o:[{t:"Magnets", c:false},{t:"Ultralight aircraft", c:true},{t:"Buses", c:false},{t:"Other cranes", c:false}], r:"Pilots in specialized aircraft led the cranes from central Wisconsin to Florida's Gulf Coast." },
    { id:43, l:"L12", q:"California condors were saved from fewer than ___ individuals in the wild.", o:[{t:"100", c:false},{t:"20", c:true},{t:"500", c:false},{t:"1,000", c:false}], r:"A captive breeding program increased their numbers from under 20 to over 400." },
    { id:44, l:"L12", q:"What is a 'Coextinction'?", o:[{t:"Two species helping each other", c:false},{t:"The loss of a predator after its only prey goes extinct", c:true},{t:"Mass death from fire", c:false},{t:"Invasive species taking over", c:false}], r:"Example: Haast's Eagle went extinct after humans wiped out its primary food source, the Moa bird." },
    { id:45, l:"L12", q:"ESA 'Critical Habitat' applies to:", o:[{t:"Only public lands", c:false},{t:"Both public and private lands", c:true},{t:"Only national parks", c:false},{t:"Only zoos", c:false}], r:"The law protects any area essential to the species' conservation, regardless of ownership." },
    { id:46, l:"L12", q:"Loss of sea ice affects polar bears because they use it for:", o:[{t:"Drinking", c:false},{t:"Hunting seals", c:true},{t:"Resting only", c:false},{t:"Fur growth", c:false}], r:"Bears need the ice as a platform to hunt; without it, they starve." },
    { id:47, l:"L12", q:"What is the #1 threat to global biodiversity?", o:[{t:"Pollution", c:false},{t:"Habitat loss and alteration", c:true},{t:"Climate change", c:false},{t:"Disease", c:false}], r:"While other factors exist, the direct loss of physical habitat is the leading driver of extinction." },
    { id:48, l:"L12", q:"What happened in the Triassic extinction regarding dinosaurs?", o:[{t:"Dinosaurs died out", c:false},{t:"Loss of competitors allowed the evolution of dinosaurs", c:true},{t:"Dinosaurs became marine", c:false},{t:"Dinosaurs moved to the poles", c:false}], r:"The loss of crurotarsans (crocodile ancestors) opened niches for dinosaur dominance." },
    { id:49, l:"L12", q:"How many of Guam's native lizard species were lost to the snake?", o:[{t:"1", c:false},{t:"6 of 12", c:true},{t:"All of them", c:false},{t:"Zero", c:false}], r:"The Brown Tree Snake decimated both bird and lizard populations in Guam." },
    { id:50, l:"L12", q:"Which bird died in 1918 in captivity?", o:[{t:"Passenger pigeon", c:false},{t:"Carolina Parakeet (Incas)", c:true},{t:"Great Auk", c:false},{t:"Dodo", c:false}], r:"Incas was the last of the Carolina Parakeets, dying 4 years after the last Passenger Pigeon." },

    // L13: INVASIVES (25 Qs)
    { id:51, l:"L13", q:"What defines an 'Invasive Species'?", o:[{t:"Any non-native species", c:false},{t:"An alien species that causes economic or environmental harm", c:true},{t:"A species from the North", c:false},{t:"A species found in zoos", c:false}], r:"It must be non-native (exotic) AND cause harm to nature, economy, or human health." },

    { id:58, l:"L13", q:"Burmese pythons in the Everglades have caused a ___% decline in some mammals.", o:[{t:"10%", c:false},{t:"50%", c:false},{t:"99%", c:true},{t:"25%", c:false}], r:"They have decimated native populations of mammals like rabbits and foxes." },
    { id:59, l:"L13", q:"'Invadable' communities often lack ___ on the invading species.", o:[{t:"Water", c:false},{t:"Predators", c:true},{t:"Sunlight", c:false},{t:"Niches", c:false}], r:"The absence of natural enemies in the new environment allows the invader to grow unchecked." },

    { id:62, l:"L13", q:"The Joro spider is an invasive recently noted as 'here to stay' in:", o:[{t:"Texas", c:false},{t:"Georgia", c:true},{t:"Maine", c:false},{t:"California", c:false}], r:"The Joro spider is a highly visible new invasive in the Georgia region." },

    { f:"Equilibrium View", b:"Hypothesis that tropics reach balance where speciation > extinction." },
    { f:"Alpha Diversity", b:"Local diversity: number of species in a small area of homogeneous habitat." },
    { f:"Gamma Diversity", b:"Regional diversity: total species in all habitats within a large area." },
    { f:"MacArthur-Wilson", b:"Model predicting island diversity based on Size and Isolation." },
    { f:"Background Rate", b:"Natural extinction rate before humans: ~1 per 10 million species per year." },
    { f:"Mass Extinction", b:"Event losing over 50% of animal species. There have been 5 major ones." },
    { f:"Permian Extinction", b:"Largest extinction recorded; lost 90-95% of marine species." },

    { f:"Coextinction", b:"Loss of a species following the loss of its only prey or partner." },

    { f:"Burmese Python", b:"Everglades invader causing 99% decline in some native mammals." },
    { f:"Asian Carp", b:"Cleaners that escaped; disrupt food webs by eating native plankton." },
    { f:"Snakehead Fish", b:"Air-breathing predator that can survive on land and crawl 400m." },
    { f:"Polyphagous", b:"Having a broad diet; a common trait of successful invaders." },
    { f:"Flagship Species", b:"Charismatic 'ambassador' used as a symbol for conservation (e.g. Panda)." },

    { f:"Ecotourism", b:"Travel providing economic incentives to locals for conserving nature." },

/* ==========================================================================
   APP LOGIC
   ========================================================================== */
let state = { answers: {}, bookmarks: [] };
let quizList = [];
let qIdx = 0;
let revMode = 'errors';
let shuffleOn = false;

function load() {
    const saved = localStorage.getItem('ecol_v6_study');
    if(saved) state = JSON.parse(saved);
}

function save() {
    localStorage.setItem('ecol_v6_study', JSON.stringify(state));
    updateDash();
}

function nav(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const match = btn.dataset.target === id;
        btn.classList.toggle('text-blue-600', match);
        btn.classList.toggle('text-slate-400', !match);
    });
    if(id === 'review') renderReview();
    window.scrollTo(0,0);
}

function updateDash() {
    const total = QUESTIONS.length;
    const answeredCount = Object.keys(state.answers).length;
    const correctCount = Object.values(state.answers).filter(v => v === true).length;
    
    document.getElementById('dash-prog').innerText = `${answeredCount}/${total}`;
    document.getElementById('dash-success').innerText = answeredCount ? Math.round((correctCount/answeredCount)*100)+'%' : '0%';
    document.getElementById('dash-errors').innerText = answeredCount - correctCount;
    document.getElementById('dash-bookmarks').innerText = state.bookmarks.length;

    let html = '';
    ['L11','L12','L13','L14'].forEach(l => {
        const lQs = QUESTIONS.filter(q => q.l === l);
        const done = lQs.filter(q => state.answers[q.id] !== undefined).length;
        const p = Math.round((done/lQs.length)*100);
        html += `<div><div class="flex justify-between text-[10px] font-black uppercase mb-1"><span>${l}</span><span>${p}%</span></div>
                 <div class="h-1 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${p}%"></div></div></div>`;
    });
    document.getElementById('chapter-stats').innerHTML = html;
}

function toggleShuffle() {
    shuffleOn = !shuffleOn;
    document.getElementById('shuffle-status').innerText = shuffleOn ? "ON" : "OFF";
    document.getElementById('btn-shuffle').classList.toggle('bg-blue-600', shuffleOn);
    document.getElementById('btn-shuffle').classList.toggle('text-white', shuffleOn);
    startQuiz();
}

function startQuiz() {
    const filter = document.getElementById('quiz-filter').value;
    quizList = filter === 'all' ? [...QUESTIONS] : QUESTIONS.filter(q => q.l === filter);
    if(shuffleOn) quizList.sort(() => Math.random() - 0.5);
    qIdx = 0;
    renderQ();
}

function renderQ() {
    const q = quizList[qIdx];
    const ui = document.getElementById('quiz-container');
    const isBook = state.bookmarks.includes(q.id);
    const userAns = state.answers[q.id];

    let html = `
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-black tracking-widest text-blue-500 uppercase px-3 py-1 bg-blue-50 rounded-full">${q.l}</span>
            <button onclick="toggleBook(${q.id})" class="text-2xl transition ${isBook?'text-amber-400':'text-gray-200'}"><i class="fas fa-bookmark"></i></button>
        </div>
        <h3 class="text-xl font-bold mb-8 leading-tight text-slate-900">${q.q}</h3>
        <div class="space-y-3">
    `;

    q.o.forEach(opt => {
        let cls = "w-full text-left p-4 border rounded-xl transition hover:bg-slate-50";
        if(userAns !== undefined) {
            if(opt.c) cls = "w-full text-left p-4 border-2 rounded-xl ans-correct";
            else if(!opt.c && userAns === false) cls = "w-full text-left p-4 border-2 rounded-xl ans-wrong";
            else cls = "w-full text-left p-4 border rounded-xl ans-neutral";
        }
        html += `<button onclick="handleAns(${q.id}, ${opt.c})" ${userAns!==undefined?'disabled':''} class="${cls}">${opt.t}</button>`;
    });

    html += `</div>`;
    if(userAns !== undefined) {
        html += `<div class="mt-10 p-6 bg-blue-50 rounded-2xl border border-blue-100">
            <p class="text-[10px] font-black uppercase text-blue-500 mb-2">Detailed Feedback</p>
            <p class="text-sm font-medium text-blue-900 leading-relaxed">${q.r}</p>
        </div>`;
    }

    ui.innerHTML = html;
    document.getElementById('quiz-counter').innerText = `Question ${qIdx+1} / ${quizList.length}`;
    if(window.MathJax) MathJax.typesetPromise();
}

function handleAns(id, correct) {
    state.answers[id] = correct;
    save();
    renderQ();
}

function navQ(dir) {
    qIdx += dir;
    if(qIdx < 0) qIdx = 0;
    if(qIdx >= quizList.length) qIdx = quizList.length - 1;
    renderQ();
}

function nextQuestion() { navQ(1); }
function prevQuestion() { navQ(-1); }

function toggleBook(id) {
    const i = state.bookmarks.indexOf(id);
    if(i > -1) state.bookmarks.splice(i,1); else state.bookmarks.push(id);
    save();
    renderQ();
}

function setReviewMode(m) {
    revMode = m;
    document.getElementById('btn-rev-errors').className = revMode==='errors' ? 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-rose-600' : 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500';
    document.getElementById('btn-rev-bookmarks').className = revMode==='bookmarks' ? 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-amber-500' : 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500';
    renderReview();
}

function renderReview() {
    const list = document.getElementById('review-list');
    const filtered = revMode === 'errors' ? QUESTIONS.filter(q => state.answers[q.id] === false) : QUESTIONS.filter(q => state.bookmarks.includes(q.id));
    if(!filtered.length) { list.innerHTML = `<p class="py-20 text-center text-slate-300 font-bold">List is empty.</p>`; return; }
    
    list.innerHTML = filtered.map(q => `
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="text-[10px] font-black text-blue-400 mb-1 tracking-widest uppercase">${q.l}</div>
            <h4 class="font-bold mb-4">${q.q}</h4>
            <div class="text-xs font-bold text-emerald-600 mb-2">Correct Answer: ${q.o.find(x=>x.c).t}</div>
            <p class="text-xs text-slate-500 leading-relaxed p-3 bg-slate-50 rounded-lg">${q.r}</p>
        </div>
    `).join('');
}

function resetData() {
    if(confirm('Clear all progress?')) { state={answers:{}, bookmarks:[]}; save(); location.reload(); }
}

function init() {
    load();
    updateDash();
    startQuiz();

    document.getElementById('flashcards-grid').innerHTML = FLASHCARDS.map(f => `
        <div class="flip-card" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front font-bold text-sm tracking-tight text-center px-4">${f.f}</div>
                <div class="flip-card-back text-[11px] leading-relaxed p-6 font-semibold">${f.b}</div>
            </div>
        </div>
    `).join('');
}

init();
</script>
