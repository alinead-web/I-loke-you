<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECOL 1000 - Professional Study Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Fixed bottom padding for mobile to prevent Nav overlap */
        .content-area { padding-bottom: 120px; }

        .flip-card { perspective: 1000px; height: 240px; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; border-radius: 1.25rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .flip-card-front { background-color: #ffffff; color: #1e293b; border: 2px solid #e2e8f0; }
        .flip-card-back { background-color: #2563eb; color: white; transform: rotateY(180deg); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Qualitative Feedback Colors */
        .ans-correct { background-color: #ecfdf5 !important; border-color: #10b981 !important; color: #065f46 !important; font-weight: 700; border-width: 2px; }
        .ans-wrong { background-color: #fff1f2 !important; border-color: #f43f5e !important; color: #9f1239 !important; font-weight: 700; border-width: 2px; }
        .ans-neutral { opacity: 0.4; pointer-events: none; border-color: #f1f5f9 !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- Mobile-First Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-[100] shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-20 px-2">
            <button onclick="nav('dashboard')" class="nav-btn flex flex-col items-center justify-center w-full transition text-slate-400 hover:text-blue-600" data-target="dashboard">
                <i class="fas fa-home text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Dashboard</span>
            </button>
            <button onclick="nav('quiz')" class="nav-btn flex flex-col items-center justify-center w-full transition text-slate-400 hover:text-blue-600" data-target="quiz">
                <i class="fas fa-tasks text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Quiz</span>
            </button>
            <button onclick="nav('flashcards')" class="nav-btn flex flex-col items-center justify-center w-full transition text-slate-400 hover:text-blue-600" data-target="flashcards">
                <i class="fas fa-clone text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Cards</span>
            </button>
            <button onclick="nav('review')" class="nav-btn flex flex-col items-center justify-center w-full transition text-slate-400 hover:text-blue-600" data-target="review">
                <i class="fas fa-history text-xl mb-1"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Review</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-4 pt-6 md:pt-12 content-area">
        
        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content active">
            <h1 class="text-3xl font-black text-slate-900 mb-1">ECOL 1000</h1>
            <p class="text-blue-600 font-bold mb-8 uppercase tracking-widest text-sm">Ecological Basis of Environmental Issues</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-black mb-1">Progress</p>
                    <p class="text-2xl font-black text-slate-800" id="dash-prog">0/100</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-black mb-1">Success</p>
                    <p class="text-2xl font-black text-emerald-600" id="dash-success">0%</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-black mb-1">Mistakes</p>
                    <p class="text-2xl font-black text-rose-500" id="dash-errors">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <p class="text-[9px] uppercase text-slate-400 font-black mb-1">Saved</p>
                    <p class="text-2xl font-black text-amber-500" id="dash-bookmarks">0</p>
                </div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl border border-slate-200 shadow-sm mb-12">
                <h2 class="text-lg font-black mb-6 uppercase tracking-tighter border-b pb-4">Lecture Mastery</h2>
                <div id="chapter-stats" class="space-y-6"></div>
            </div>
            
            <div class="flex justify-center">
                <button onclick="resetData()" class="text-[10px] text-slate-300 hover:text-rose-500 transition tracking-widest uppercase font-black">Wipe All Data</button>
            </div>
        </section>

        <!-- QUIZ -->
        <section id="quiz" class="tab-content">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Study Bank</h2>
                <div class="flex gap-2 w-full md:w-auto">
                    <button id="btn-shuffle" onclick="toggleShuffle()" class="flex-1 md:flex-none px-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-black transition hover:bg-slate-50 uppercase tracking-widest"><i class="fas fa-random mr-2"></i>Shuffle: <span id="shuffle-status">OFF</span></button>
                    <select id="quiz-filter" class="flex-1 md:flex-none p-2 border border-slate-200 rounded-xl text-[10px] font-black bg-white uppercase tracking-widest focus:outline-none" onchange="startQuiz()">
                        <option value="all">All Lectures</option>
                        <option value="L11">L11 - Biodiversity</option>
                        <option value="L12">L12 - Extinctions</option>
                        <option value="L13">L13 - Invasives</option>
                        <option value="L14">L14 - Conservation</option>
                    </select>
                </div>
            </div>
            
            <div id="quiz-container" class="bg-white p-6 md:p-10 rounded-[2rem] shadow-sm border border-slate-200 min-h-[350px]"></div>
            
            <div class="flex justify-between items-center mt-8">
                <button onclick="prevQuestion()" class="w-14 h-14 flex items-center justify-center bg-white border border-slate-200 rounded-2xl hover:bg-slate-50 transition active:scale-95 shadow-sm"><i class="fas fa-chevron-left"></i></button>
                <span id="quiz-counter" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Question 1 / 100</span>
                <button onclick="nextQuestion()" class="w-14 h-14 flex items-center justify-center bg-blue-600 text-white rounded-2xl hover:bg-blue-700 active:scale-95 shadow-lg shadow-blue-100 transition"><i class="fas fa-chevron-right"></i></button>
            </div>
        </section>

        <!-- CARDS -->
        <section id="flashcards" class="tab-content">
            <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter mb-6">Terminology (32)</h2>
            <div id="flashcards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- REVIEW -->
        <section id="review" class="tab-content">
            <h2 class="text-2xl font-black text-slate-900 mb-6 uppercase tracking-tighter">My Weak Spots</h2>
            <div class="flex space-x-2 mb-8 bg-slate-200 p-1 rounded-2xl w-fit">
                <button onclick="setReviewMode('errors')" id="btn-rev-errors" class="px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-rose-600">Mistakes</button>
                <button onclick="setReviewMode('bookmarks')" id="btn-rev-bookmarks" class="px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500">Favorited</button>
            </div>
            <div id="review-list" class="space-y-6"></div>
        </section>

    </main>

<script>
/* ==========================================================================
   BANK: 100 QUESTIONS + 32 FLASHCARDS
   ========================================================================== */
const QUESTIONS = [
    // L11: BIODIVERSITY (25)
    { id:1, l:"L11", q:"How is biodiversity measured within a population?", o:[{t:"Genetic variation among individuals", c:true},{t:"Total species count", c:false},{t:"Alpha diversity index", c:false},{t:"Number of habitats", c:false}], r:"Within populations, biodiversity is the genetic diversity. This includes variations such as hair color, height, and blood type among individuals." },
    { id:2, l:"L11", q:"Mating between closely related individuals is known as:", o:[{t:"Outbreeding", c:false},{t:"Inbreeding", c:true},{t:"Crossbreeding", c:false},{t:"Cloning", c:false}], r:"Inbreeding results from small populations and increases the risk of genetic diseases such as hemophilia or cystic fibrosis." },
    { id:3, l:"L11", q:"What is the primary benefit of 'Outbreeding'?", o:[{t:"It creates smaller animals", c:false},{t:"It maximizes genetic diversity", c:true},{t:"It leads to localized endemism", c:false},{t:"It stops migration", c:false}], r:"Outbreeding occurs through the sexual reproduction of individuals that are not closely related, maximizing genetic health." },
    { id:4, l:"L11", q:"Endemic species are characterized as being:", o:[{t:"Found everywhere on Earth", c:false},{t:"Found only in specific, localized areas", c:true},{t:"An introduced species", c:false},{t:"A species gone extinct", c:false}], r:"Endemic species have a very restricted range. Example: Jordan's salamander, found only in the moisture-rich forests of the southern Appalachians." },
    { id:5, l:"L11", q:"Species diversity consists of richness and:", o:[{t:"Genetic health", c:false},{t:"Relative abundance", c:true},{t:"Migration patterns", c:false},{t:"Climatic matching", c:false}], r:"Species diversity is not just the count (richness), but also how many individuals of each species exist (abundance)." },
    { id:6, l:"L11", q:"Ecological diversity includes variety in habitats, niches, and:", o:[{t:"Blood types", c:false},{t:"Trophic levels and community interactions", c:true},{t:"Gene mutations", c:false},{t:"Zoos", c:false}], r:"Ecological diversity focuses on the structural and functional variety of entire communities." },
    { id:7, l:"L11", q:"Which taxonomic group accounts for the most known global biodiversity?", o:[{t:"Vertebrates", c:false},{t:"Plants", c:false},{t:"Insects", c:true},{t:"Fungi", c:false}], r:"Insects have approximately 1 million known species and up to 9 million estimated, by far the largest group." },
    { id:8, l:"L11", q:"Species richness generally increases markedly moving toward the:", o:[{t:"Poles", c:false},{t:"Equator", c:true},{t:"High altitudes", c:false},{t:"Oceans", c:false}], r:"The Latitudinal Diversity Gradient shows that species numbers (ants, birds, trees) increase significantly near the equator." },
    { id:9, l:"L11", q:"The 'Time View' hypothesis for tropical diversity states that:", o:[{t:"Tropics have shorter days", c:false},{t:"Tropical habitats are older and had more time to accumulate species", c:true},{t:"Mutation rates are faster", c:false},{t:"Speciation is impossible", c:false}], r:"Tropical areas weren't covered by ice during glaciations, allowing a longer span for the process of speciation." },
    { id:10, l:"L11", q:"According to MacArthur-Wilson, where is the species balance point on an island?", o:[{t:" colonization peak", c:false},{t:"Where colonization and extinction rates cross", c:true},{t:"At the start of extinction", c:false},{t:"The center of the island", c:false}], r:"The equilibrium number (\\(\\hat{S}\\)) is the balance point between species arriving and species dying out." },
    { id:11, l:"L11", q:"Large islands generally support more species because:", o:[{t:"They are closer to land", c:false},{t:"They have lower extinction rates", c:true},{t:"They have fewer niches", c:false},{t:"They have no predators", c:false}], r:"Large islands support larger populations, which significantly reduces the probability of extinction." },
    { id:12, l:"L11", q:"The structural complexity of a habitat like a coral reef results in:", o:[{t:"Fewer species", c:false},{t:"Many more habitats and niches", c:true},{t:"Less oxygen", c:false},{t:"Higher extinction", c:false}], r:"Physical architecture (branches, nooks) creates more specialized spaces for diverse life." },
    { id:13, l:"L11", q:"Alpha diversity is a measure of:", o:[{t:"Regional richness", c:false},{t:"Local diversity in a small homogeneous area", c:true},{t:"Genetic health", c:false},{t:"Global count", c:false}], r:"Alpha is the smallest scale of diversity measurement (local habitat)." },
    { id:14, l:"L11", q:"What is 'Gamma Diversity'?", o:[{t:"Diversity in one lake", c:false},{t:"Total species in all habitats within a large regional area", c:true},{t:"Diversity between siblings", c:false},{t:"Diversity of predators only", c:false}], r:"Gamma diversity measures the total variety across an entire regional landscape." },
    { id:15, l:"L11", q:"The 25 global biodiversity hotspots cover only ___ of land area.", o:[{t:"10%", c:false},{t:"1.4%", c:true},{t:"50%", c:false},{t:"25%", c:false}], r:"Hotspots are high-priority zones because they hold 44% of all plants in a tiny fraction of land area." },
    { id:16, l:"L11", q:"Which state is a global hotspot for salamander and mussel diversity?", o:[{t:"California", c:false},{t:"Georgia", c:true},{t:"Florida", c:false},{t:"Texas", c:false}], r:"Georgia's aquatic systems and humid forests host exceptional variety shown in slides 8-10." },
    { id:17, l:"L11", q:"Which island type would have the LOWEST biodiversity according to the model?", o:[{t:"Large island near mainland", c:false},{t:"Small island far from mainland", c:true},{t:"Small island near mainland", c:false},{t:"Large island far from mainland", c:false}], r:"Small, far islands have low colonization and high extinction rates." },
    { id:18, l:"L11", q:"Speciation has had a longer span in which habitat?", o:[{t:"Arctic", c:false},{t:"Tropical", c:true},{t:"Alpine", c:false},{t:"Desert", c:false}], r:"Tropical habitats are older than temperate/arctic habitats that were impacted by ice ages." },
    { id:19, l:"L11", q:"Approximately how many plant species are identified currently?", o:[{t:"10,000", c:false},{t:"310,129", c:true},{t:"1 million", c:false},{t:"50,000", c:false}], r:"Scientists have identified roughly 310,000 species, though estimates suggest more exist." },
    { id:20, l:"L11", q:"Small populations are most at risk of:", o:[{t:"Outbreeding", c:false},{t:"Inbreeding and genetic diseases", c:true},{t:"Too much food", c:false},{t:"New mutations", c:false}], r:"Lack of partners forces mating between relatives, decreasing genetic health." },
    { id:21, l:"L11", q:"Outbreeding results from reproduction of individuals that are:", o:[{t:"Not closely related", c:true},{t:"Same gender", c:false},{t:"Same family", c:false},{t:"Clones", c:false}], r:"Outbreeding ensures a diverse and resilient gene pool." },
    { id:22, l:"L11", q:"Which factor increases the colonization rate in island biogeography?", o:[{t:"Large size", c:false},{t:"Close distance to mainland", c:true},{t:"High altitude", c:false},{t:"Deep water", c:false}], r:"Proximity makes it much easier for mainland species to reach the island." },
    { id:23, l:"L11", q:"A 'hotspot' requires high diversity and high ___.", o:[{t:"Pollution", c:false},{t:"Endemism", c:true},{t:"Rainfall", c:false},{t:"Industry", c:false}], r:"Endemism (found nowhere else) is the defining marker of a hotspot." },
    { id:24, l:"L11", q:"Genetic diversity is most vital for survival in:", o:[{t:"Static environments", c:false},{t:"Changing environments", c:true},{t:"Zoos", c:false},{t:"Cages", c:false}], r:"Variation gives a population the traits needed to adapt to shifts in climate or food." },
    { id:25, l:"L11", q:"True or False: Earth currently has more species than ever in its history.", o:[{t:"True", c:true},{t:"False", c:false}], r:"Slide 3: 'At no time in the history of Earth has there been more species than now'." },

    // L12: EXTINCTIONS (25)
    { id:26, l:"L12", q:"Over ___% of species that ever lived on Earth are now extinct.", o:[{t:"10%", c:false},{t:"Over 99%", c:true},{t:"50%", c:false},{t:"20%", c:false}], r:"Extinction is a normal part of life; almost every lineage that ever appeared is gone." },
    { id:27, l:"L12", q:"A mass extinction event involves the loss of over ___% of species.", o:[{t:"10%", c:false},{t:"50%", c:true},{t:"25%", c:false},{t:"100%", c:false}], r:"There have been 5 such major events in the last 540 million years." },
    { id:28, l:"L12", q:"The largest extinction, losing 90-95% of marine life, was the:", o:[{t:"K-T", c:false},{t:"Permian", c:true},{t:"Ordovician", c:false},{t:"Devonian", c:false}], r:"The Permian extinction (approx 290M yrs ago) was the most severe in history." },
    { id:29, l:"L12", q:"The most recent major extinction (K-T) occurred approx. how many years ago?", o:[{t:"10k", c:false},{t:"65.5 million", c:true},{t:"290M", c:false},{t:"1.6M", c:false}], r:"The K-T event was likely caused by an asteroid impact in the Gulf of Mexico." },
    { id:30, l:"L12", q:"What is the natural 'background rate' of extinction?", o:[{t:"1 per 10 million species per year", c:true},{t:"100 per year", c:false},{t:"1 per day", c:false},{t:"1 per century", c:false}], r:"This is the average rate of disappearance before humans appeared." },
    { id:31, l:"L12", q:"Current extinction rates are ___ times the background rate.", o:[{t:"10x", c:false},{t:"1,000 to 10,000x", c:true},{t:"100x", c:false},{t:"No increase", c:false}], r:"Human activity (HIPPCO) has radically accelerated species loss." },
    { id:32, l:"L12", q:"Which bird, once found in the billions, died in 1914?", o:[{t:"Passenger Pigeon", c:true},{t:"Dodo", c:false},{t:"Moa", c:false},{t:"Whooping Crane", c:false}], r:"Martha, the last passenger pigeon, marked the end of a once-billions-strong population." },
    { id:33, l:"L12", q:"What caused the Great Auk extinction?", o:[{t:"Loss of ice", c:false},{t:"Commercial overhunting for meat and oil", c:true},{t:"Disease", c:false},{t:"Rats", c:false}], r:"This penguin-like bird was exploited until it vanished completely." },
    { id:34, l:"L12", q:"'Extirpated' means that a species is:", o:[{t:"Dead globally", c:false},{t:"Dead locally but exists elsewhere", c:true},{t:"Invasive", c:false},{t:"Dangerous", c:false}], r:"Example: Mammals gone from the Everglades but still alive elsewhere." },
    { id:35, l:"L12", q:"Why is seasonal migration a risk factor?", o:[{t:"Too much energy used", c:false},{t:"Loss of one critical habitat ends the species", c:true},{t:"Predators eat them", c:false},{t:"They get lost", c:false}], r:"Migrants need a chain of healthy habitats; one break ends the species." },
    { id:36, l:"L12", q:"Large home ranges like the Florida panther's are threatened by:", o:[{t:"Disease", c:false},{t:"Habitat fragmentation", c:true},{t:"Floods", c:false},{t:"Zoos", c:false}], r:"Fragmentation traps individuals in tiny patches, preventing breeding and movement." },
    { id:37, l:"L12", q:"The IUCN defines 'Critically Endangered' as a ___ risk in 10 years.", o:[{t:"10%", c:false},{t:"50%", c:true},{t:"20%", c:false},{t:"100%", c:false}], r:"The highest threat category on the Red List before extinction." },
    { id:38, l:"L12", q:"In what year was the Endangered Species Act (ESA) passed?", o:[{t:"1914", c:false},{t:"1973", c:true},{t:"1992", c:false},{t:"1850", c:false}], r:"A landmark US law to halt extinction regardless of economic cost." },
    { id:39, l:"L12", q:"Which tiny fish reached the Supreme Court under the ESA?", o:[{t:"Snail Darter", c:true},{t:"Blue shiner", c:false},{t:"Sturgeon", c:false},{t:"Amber darter", c:false}], r:"Its habitat halted the $100M Tellico Dam project." },
    { id:40, l:"L12", q:"Why was listing the Polar Bear controversial?", o:[{t:"It was invasive", c:false},{t:"It linked $CO_2$ and climate change to the ESA", c:true},{t:"It didn't eat seals", c:false},{t:"It was recovered", c:false}], r:"The listing acknowledged greenhouse gases as the cause of habitat loss." },
    { id:41, l:"L12", q:"How many species had been delisted from recovery by 2012?", o:[{t:"56 total, 28 from recovery", c:true},{t:"Zero", c:false},{t:"500", c:false},{t:"10", c:false}], r:"Half of all delistings were due to successful population recovery." },
    { id:42, l:"L12", q:"What was used to teach Whooping Cranes to migrate?", o:[{t:"Other birds", c:false},{t:"Ultralight aircraft", c:true},{t:"Trucks", c:false},{t:"Magnets", c:false}], r:"Pilots in ultralights led them from Wisconsin to Florida." },
    { id:43, l:"L12", q:"California condors fell to below ___ in the wild.", o:[{t:"100", c:false},{t:"20", c:true},{t:"500", c:false},{t:"50", c:false}], r:"Breeding programs brought them back from the very brink." },
    { id:44, l:"L12", q:"What is a 'Coextinction'?", o:[{t:"Two species helping", c:false},{t:"Loss of a predator after its only prey dies", c:true},{t:"Mass fire death", c:false},{t:"Invasives", c:false}], r:"Example: Haast's Eagle died after the Moa bird was wiped out." },
    { id:45, l:"L12", q:"ESA 'Critical Habitat' applies to:", o:[{t:"Only public lands", c:false},{t:"Both public and private lands", c:true},{t:"Only parks", c:false},{t:"Zoos", c:false}], r:"The law covers any area essential for species conservation." },
    { id:46, l:"L12", q:"Loss of sea ice affects polar bears for:", o:[{t:"Drinking", c:false},{t:"Hunting seals", c:true},{t:"Sleeping", c:false},{t:"Fur growth", c:false}], r:"Bears use ice as a platform to hunt; without it, they cannot catch food." },
    { id:47, l:"L12", q:"What is the #1 threat to global biodiversity?", o:[{t:"Pollution", c:false},{t:"Habitat loss and alteration", c:true},{t:"Climate change", c:false},{t:"Disease", c:false}], r:"Direct physical loss of habitat is the leading driver of extinction." },
    { id:48, l:"L12", q:"What happened in the Triassic extinction?", o:[{t:"Dinosaurs died", c:false},{t:"Loss of competitors allowed dinosaur evolution", c:true},{t:"Humans arrived", c:false},{t:"Oceans dried", c:false}], r:"Loss of crocodile ancestors opened niches for dinosaur dominance." },
    { id:49, l:"L12", q:"How many Guam native lizards were lost to the snake?", o:[{t:"1", c:false},{t:"6 of 12", c:true},{t:"All", c:false},{t:"None", c:false}], r:"The snake decimated birds and lizards alike." },
    { id:50, l:"L12", q:"Which bird died in 1918 in captivity?", o:[{t:"Carolina Parakeet (Incas)", c:true},{t:"Passenger pigeon", c:false},{t:"Dodo", c:false},{t:"Moa", c:false}], r:"Incas was the last parakeet, dying 4 years after the last pigeon." },

    // L13: INVASIVES (25)
    { id:51, l:"L13", q:"What defines an 'Invasive Species'?", o:[{t:"Any non-native", c:false},{t:"Alien species causing harm", c:true},{t:"Pet store animals", c:false},{t:"Only plants", c:false}], r:"It must be non-native AND cause harm to nature, economy, or health." },

    { f:"Equilibrium View", b:"Hypothesis that tropics reach balance where speciation > extinction." },
    { f:"Alpha Diversity", b:"Local diversity: number of species in a small area of homogeneous habitat." },

    { f:"MacArthur-Wilson", b:"Model predicting island diversity based on island Size and Isolation." },
    { f:"Background Rate", b:"Natural extinction rate before humans: ~1 per 10 million species per year." },
    { f:"Mass Extinction", b:"Event losing over 50% of animal species. Earth has had 5 major ones." },

/* ==========================================================================
   APP LOGIC
   ========================================================================== */
let state = { answers: {}, bookmarks: [] };
let quizList = [];
let qIdx = 0;
let revMode = 'errors';
let shuffleOn = false;

function load() {
    const saved = localStorage.getItem('ecol_v7_study');
    if(saved) state = JSON.parse(saved);
}

function save() {
    localStorage.setItem('ecol_v7_study', JSON.stringify(state));
    updateDash();
}

function nav(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const match = btn.dataset.target === id;
        btn.classList.toggle('text-blue-600', match);
        btn.classList.toggle('text-slate-400', !match);
    });
    if(id === 'review') renderReview();
    window.scrollTo(0,0);
}

function updateDash() {
    const total = QUESTIONS.length;
    const answeredCount = Object.keys(state.answers).length;
    const correctCount = Object.values(state.answers).filter(v => v === true).length;
    
    document.getElementById('dash-prog').innerText = `${answeredCount}/${total}`;
    document.getElementById('dash-success').innerText = answeredCount ? Math.round((correctCount/answeredCount)*100)+'%' : '0%';
    document.getElementById('dash-errors').innerText = answeredCount - correctCount;
    document.getElementById('dash-bookmarks').innerText = state.bookmarks.length;

    let html = '';
    ['L11','L12','L13','L14'].forEach(l => {
        const lQs = QUESTIONS.filter(q => q.l === l);
        const done = lQs.filter(q => state.answers[q.id] !== undefined).length;
        const p = Math.round((done/lQs.length)*100);
        html += `<div><div class="flex justify-between text-[10px] font-black uppercase mb-1"><span>${l}</span><span>${p}%</span></div>
                 <div class="h-1 bg-gray-200 rounded-full overflow-hidden"><div class="h-full bg-blue-500" style="width:${p}%"></div></div></div>`;
    });
    document.getElementById('chapter-stats').innerHTML = html;
}

function toggleShuffle() {
    shuffleOn = !shuffleOn;
    document.getElementById('shuffle-status').innerText = shuffleOn ? "ON" : "OFF";
    document.getElementById('btn-shuffle').classList.toggle('bg-blue-600', shuffleOn);
    document.getElementById('btn-shuffle').classList.toggle('text-white', shuffleOn);
    startQuiz();
}

function startQuiz() {
    const filter = document.getElementById('quiz-filter').value;
    quizList = filter === 'all' ? [...QUESTIONS] : QUESTIONS.filter(q => q.l === filter);
    if(shuffleOn) quizList.sort(() => Math.random() - 0.5);
    qIdx = 0;
    renderQ();
}

function renderQ() {
    const q = quizList[qIdx];
    const ui = document.getElementById('quiz-container');
    const isBook = state.bookmarks.includes(q.id);
    const userAns = state.answers[q.id];

    let html = `
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] font-black tracking-widest text-blue-500 uppercase px-3 py-1 bg-blue-50 rounded-full">${q.l}</span>
            <button onclick="toggleBook(${q.id})" class="text-2xl transition active:scale-110 ${isBook?'text-amber-400':'text-gray-200'}"><i class="fas fa-bookmark"></i></button>
        </div>
        <h3 class="text-xl font-bold mb-8 leading-tight text-slate-900">${q.q}</h3>
        <div class="space-y-3">
    `;

    q.o.forEach(opt => {
        let cls = "w-full text-left p-4 border rounded-2xl transition hover:bg-slate-50 active:scale-[0.98]";
        if(userAns !== undefined) {
            if(opt.c) cls = "w-full text-left p-4 border-2 rounded-2xl ans-correct";
            else if(!opt.c && userAns === false) cls = "w-full text-left p-4 border-2 rounded-2xl ans-wrong";
            else cls = "w-full text-left p-4 border rounded-2xl ans-neutral";
        }
        html += `<button onclick="handleAns(${q.id}, ${opt.c})" ${userAns!==undefined?'disabled':''} class="${cls}">${opt.t}</button>`;
    });

    html += `</div>`;
    if(userAns !== undefined) {
        html += `<div id="rationale-box" class="mt-8 p-5 bg-blue-50 rounded-2xl border border-blue-100">
            <p class="text-[10px] font-black uppercase text-blue-500 mb-2">Rationale</p>
            <p class="text-sm font-medium text-blue-900 leading-relaxed">${q.r}</p>
        </div>`;
        // Scroll to the rationale after answer
        setTimeout(() => { document.getElementById('rationale-box').scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 100);
    }

    ui.innerHTML = html;
    document.getElementById('quiz-counter').innerText = `Question ${qIdx+1} / ${quizList.length}`;
    if(window.MathJax) MathJax.typesetPromise();
}

function handleAns(id, correct) {
    state.answers[id] = correct;
    save();
    renderQ();
}

function navQ(dir) {
    qIdx += dir;
    if(qIdx < 0) qIdx = 0;
    if(qIdx >= quizList.length) qIdx = quizList.length - 1;
    renderQ();
    window.scrollTo(0,0);
}

function nextQuestion() { navQ(1); }
function prevQuestion() { navQ(-1); }

function toggleBook(id) {
    const i = state.bookmarks.indexOf(id);
    if(i > -1) state.bookmarks.splice(i,1); else state.bookmarks.push(id);
    save();
    renderQ();
}

function setReviewMode(m) {
    revMode = m;
    document.getElementById('btn-rev-errors').className = revMode==='errors' ? 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-rose-600' : 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500';
    document.getElementById('btn-rev-bookmarks').className = revMode==='bookmarks' ? 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition shadow-sm bg-white text-amber-500' : 'px-6 py-2 rounded-xl font-black text-[10px] uppercase tracking-widest transition text-slate-500';
    renderReview();
}

function renderReview() {
    const list = document.getElementById('review-list');
    const filtered = revMode === 'errors' ? QUESTIONS.filter(q => state.answers[q.id] === false) : QUESTIONS.filter(q => state.bookmarks.includes(q.id));
    if(!filtered.length) { list.innerHTML = `<p class="py-20 text-center text-slate-300 font-bold">List is empty.</p>`; return; }
    
    list.innerHTML = filtered.map(q => `
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="text-[10px] font-black text-blue-400 mb-1 tracking-widest uppercase">${q.l}</div>
            <h4 class="font-bold mb-4">${q.q}</h4>
            <div class="text-xs font-bold text-emerald-600 mb-2 underline">Correct Answer: ${q.o.find(x=>x.c).t}</div>
            <p class="text-xs text-slate-500 leading-relaxed p-4 bg-slate-50 rounded-xl mt-4">${q.r}</p>
        </div>
    `).join('');
}

function resetData() {
    if(confirm('Wipe all local progress?')) { state={answers:{}, bookmarks:[]}; save(); location.reload(); }
}

function init() {
    load();
    updateDash();
    startQuiz();

    document.getElementById('flashcards-grid').innerHTML = FLASHCARDS.map(f => `
        <div class="flip-card" onclick="this.classList.toggle('flipped')">
            <div class="flip-card-inner">
                <div class="flip-card-front font-bold text-sm tracking-tight text-center px-4">${f.f}</div>
                <div class="flip-card-back text-[11px] leading-relaxed p-6 font-semibold">${f.b}</div>
            </div>
        </div>
    `).join('');
}

init();
</script>
